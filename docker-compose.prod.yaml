services:
  postgres:
    image: postgres:17
    container_name: investment-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: investment-backend
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        - BACKEND_URL=http://investment-backend:8000
    container_name: investment-frontend
    env_file: .env
    environment:
      - BACKEND_URL=http://investment-backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data: